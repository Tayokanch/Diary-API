services:

  db:
    image: postgres:16
    container_name: diary-hub-db

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mypasswordnotcorrect12343
      POSTGRES_DB: mydb

    ports:
      - "5432:5432"

    restart: unless-stopped

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migration:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata: