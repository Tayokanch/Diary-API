services:

  # -----------------------
  # PostgreSQL Database
  # -----------------------
  diaryhub-db:
    image: tayokanch/postgres:16
    container_name: diary-hub-db
    restart: always

    environment: ## This Environment Variable are used at when the container is composed
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    expose:
      - 5432

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

    networks:
      - diaryhub_api_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      retries: 5
      start_period: 10s

  # -----------------------
  # API
  # -----------------------
  diaryhub-api:
    build: .
    container_name: diaryhub-api

    env_file: # This inject environment variable at runtime
      - .env

    depends_on:
      diaryhub-db:
        condition: service_healthy

    restart: always

    networks:
      - diaryhub_api_network

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 5s
      retries: 5
      start_period: 20s

# -----------------------
# Volumes
# -----------------------
volumes:
  pgdata:

# -----------------------
# Networks
# -----------------------
networks:
  diaryhub_api_network:
    driver: bridge